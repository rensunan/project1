<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>☁️ 个人云数据存储</title>
<style>/* Card file icon (no image loading) */
.card-file-icon{font-size:2.8rem;text-align:center;padding:20px 0 10px;opacity:.6}
.card-file-meta{text-align:center;margin-bottom:12px}
.card-file-name{font-size:.8rem;color:var(--text);display:block;word-break:break-all}
.card-file-size{font-size:.7rem;color:var(--text2)}

/* Lazy image loader in detail */
.lazy-image{min-height:120px}
.lazy-placeholder{text-align:center;padding:40px 20px;cursor:pointer;border:2px dashed var(--border);border-radius:var(--radius);transition:all var(--transition)}
.lazy-placeholder:hover{border-color:var(--accent);background:rgba(124,92,252,.05)}
.lazy-icon{font-size:3rem;margin-bottom:10px}
.lazy-placeholder p{color:var(--text2);font-size:.85rem;margin-bottom:14px}
.detail-file-info{display:flex;align-items:center;gap:16px;padding:20px}
.file-type-icon{font-size:3rem;opacity:.6}
.text2{color:var(--text2);font-size:.82rem}

/* Upload progress bar */
.upload-progress{display:none;margin-top:10px;background:var(--surface2);border-radius:6px;height:20px;position:relative;overflow:hidden}
.upload-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--success));border-radius:6px;transition:width .2s;width:0%}
.upload-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#fff;font-weight:700;text-shadow:0 1px 2px rgba(0,0,0,.3)}
/* ===== Login Screen ===== */
.login-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:var(--bg);background-image:radial-gradient(ellipse at 20% 20%,#1a1040 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#101040 0%,transparent 50%)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:90%;max-width:400px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .4s ease}
.login-logo{font-size:3.5rem;margin-bottom:8px}
.login-card h1{font-size:1.6rem;color:var(--text);margin-bottom:6px}
.login-sub{color:var(--text2);font-size:.85rem;margin-bottom:28px}
.login-error{color:var(--danger);font-size:.82rem;min-height:20px;margin-bottom:12px;text-align:center}
.login-card .form-group{text-align:left}
.login-card .btn-primary{margin-top:4px}

/* Settings modal */
.settings-section{margin-bottom:24px}
.settings-section h3{font-size:.95rem;color:var(--text);margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.user-info{display:flex;align-items:center;gap:10px;padding:12px;background:var(--surface2);border-radius:var(--radius-sm);margin-bottom:16px}
.user-info .avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:#fff;flex-shrink:0}
.user-info .name{font-weight:600;color:var(--text)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--surface:#1a1a2e;--surface2:#222240;--border:#2a2a4a;--text:#e0e0f0;--text2:#9090b0;--accent:#7c5cfc;--accent2:#a78bfa;--danger:#f87171;--success:#34d399;--warning:#fbbf24;--info:#60a5fa;--radius:12px;--radius-sm:8px;--shadow:0 4px 24px rgba(0,0,0,.4);--transition:0.25s cubic-bezier(.4,0,.2,1)}
body{font-family:"Inter","Segoe UI",system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;background-image:radial-gradient(ellipse at 20% 20%,#1a1040 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#101040 0%,transparent 50%)}
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:rgba(26,26,46,.85);backdrop-filter:blur(20px);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform var(--transition)}
.sidebar-logo{font-size:1.4rem;font-weight:700;margin-bottom:32px;display:flex;align-items:center;gap:10px}
.sidebar-logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-group{margin-bottom:24px}
.nav-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:8px;padding:0 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);color:var(--text2);font-size:.9rem;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(124,92,252,.4)}
.nav-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-count{font-size:.75rem;background:var(--surface2);padding:2px 8px;border-radius:99px;margin-left:auto}
.nav-item.active .nav-count{background:rgba(255,255,255,.2)}
.main{flex:1;margin-left:260px;padding:32px}

/* ===== Storage Stats Bar ===== */
.stats-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:28px}
.stats-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.stats-header h3{font-size:.95rem;color:var(--text);margin:0}
.stats-total{font-size:.85rem;color:var(--text2)}
.stats-total strong{color:var(--text);font-size:1.05rem}
.stats-progress{height:12px;background:var(--surface2);border-radius:6px;overflow:hidden;display:flex;margin-bottom:14px}
.stats-segment{height:100%;transition:width .5s ease;min-width:2px}
.stats-segment:hover{filter:brightness(1.3)}
.stats-legend{display:flex;flex-wrap:wrap;gap:12px}
.stats-legend-item{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text2)}
.stats-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.stats-legend-item strong{color:var(--text)}
.stats-empty{text-align:center;padding:12px;color:var(--text2);font-size:.85rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:16px}
.header-title{font-size:1.8rem;font-weight:700}
.header-actions{display:flex;gap:10px}
.btn{padding:10px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:.88rem;font-weight:600;transition:all var(--transition);display:inline-flex;align-items:center;gap:8px}
.btn-primary{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(124,92,252,.35)}
.btn-primary:hover{background:var(--accent2);transform:translateY(-1px);box-shadow:0 6px 20px rgba(124,92,252,.5)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{opacity:.9}
.btn-sm{padding:6px 12px;font-size:.8rem}
.search-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0 16px;transition:all var(--transition);flex:1;max-width:360px}
.search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,92,252,.15)}
.search-bar input{background:none;border:none;color:var(--text);padding:12px 0;font-size:.9rem;width:100%;outline:none}
.search-bar input::placeholder{color:var(--text2)}
.search-icon{color:var(--text2);font-size:1.1rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all var(--transition);position:relative;overflow:hidden}
.card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}
.card::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--cat-color,#7c5cfc)}
/* card::before background color set via inline style from CATEGORIES config */
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-title{font-weight:600;font-size:1rem;word-break:break-word;flex:1;margin-right:8px}
/* card-category colors set via inline style from CATEGORIES config */
.card-category{font-size:.7rem;padding:3px 10px;border-radius:99px;text-transform:uppercase;letter-spacing:.05em;font-weight:600;white-space:nowrap}
.card-preview{color:var(--text2);font-size:.85rem;line-height:1.5;margin-bottom:12px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:var(--text2)}
.card-actions{display:flex;gap:6px}
.card-icon-btn{width:32px;height:32px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);font-size:.85rem}
.card-icon-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.card-icon-btn.danger:hover{background:var(--danger);border-color:var(--danger)}
.masonry{columns:4 240px;column-gap:20px}
.masonry .sticky-card{break-inside:avoid;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:all var(--transition);position:relative}
.masonry .sticky-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.masonry .sticky-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:var(--radius) var(--radius) 0 0}
.sticky-title{font-weight:700;font-size:1.05rem;margin-bottom:10px;color:var(--accent2)}
.sticky-fields{display:flex;flex-direction:column;gap:6px}
.sticky-field{font-size:.82rem;color:var(--text2)}.sticky-field strong{color:var(--text);margin-right:4px}
.sticky-actions{display:flex;gap:6px;margin-top:14px;justify-content:flex-end}
.sticky-sensitive{color:var(--warning);font-size:.7rem;margin-top:8px;display:flex;align-items:center;gap:4px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-size:1.3rem;margin-bottom:24px;color:var(--text)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:.82rem;color:var(--text2);margin-bottom:6px;font-weight:600}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:.9rem;outline:none;transition:border-color var(--transition);font-family:inherit}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--accent)}
.form-group textarea{resize:vertical;min-height:100px}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
.file-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:32px;text-align:center;cursor:pointer;transition:all var(--transition);color:var(--text2)}
.file-drop:hover,.file-drop.drag{border-color:var(--accent);background:rgba(124,92,252,.05)}
.file-drop .icon{font-size:2rem;margin-bottom:8px}.file-drop p{font-size:.85rem}
.file-preview{display:flex;align-items:center;gap:10px;margin-top:10px;padding:10px;background:var(--surface2);border-radius:var(--radius-sm)}
.file-preview img{width:40px;height:40px;object-fit:cover;border-radius:4px}
.file-preview .name{font-size:.82rem;color:var(--text);word-break:break-all}
.file-preview .size{font-size:.72rem;color:var(--text2)}
.file-preview .remove{color:var(--danger);cursor:pointer;margin-left:auto;font-size:1.2rem}
.pw-field{position:relative}.pw-field input{padding-right:40px}
.pw-toggle{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;padding:4px}
.pw-toggle:hover{color:var(--text)}
.toast-container{position:fixed;top:20px;right:20px;z-index:300;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;animation:slideIn .3s ease;box-shadow:var(--shadow);max-width:360px}
.toast.success{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
.toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.empty{text-align:center;padding:60px 20px;color:var(--text2)}
.empty .icon{font-size:4rem;margin-bottom:16px;opacity:.5}
.empty h3{font-size:1.2rem;margin-bottom:8px;color:var(--text)}
.empty p{font-size:.9rem;margin-bottom:20px}
.detail-back{color:var(--text2);cursor:pointer;font-size:.9rem;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px}
.detail-back:hover{color:var(--text)}
.detail-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.detail-content pre{white-space:pre-wrap;word-break:break-word;font-family:inherit;font-size:.9rem;line-height:1.7;color:var(--text)}
.detail-content img{max-width:100%;border-radius:var(--radius-sm)}
.detail-fields{display:flex;flex-direction:column;gap:12px}
.detail-field{display:flex;gap:8px;font-size:.9rem}
.detail-field .label{color:var(--text2);min-width:70px}
.detail-field .value{color:var(--text);word-break:break-all}
.detail-field .value.mono{font-family:"Fira Code","Consolas",monospace;background:var(--surface2);padding:4px 10px;border-radius:var(--radius-sm)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:flex;align-items:center;justify-content:center}
.confirm-dialog{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px;max-width:400px;text-align:center}
.confirm-dialog h3{margin-bottom:12px;font-size:1.1rem}
.confirm-dialog p{color:var(--text2);font-size:.9rem;margin-bottom:20px}
.confirm-actions{display:flex;gap:10px;justify-content:center}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0;padding:20px}.header-title{font-size:1.4rem}.masonry{columns:2 180px}.menu-btn{display:flex!important}}
.menu-btn{display:none;position:fixed;top:16px;left:16px;z-index:110;width:40px;height:40px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:1.2rem;cursor:pointer;align-items:center;justify-content:center}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--text2)}






/* Uploading toast */
.toast-info{background:var(--primary);color:#fff}
.toast-spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}</style>
</head>
<body>
<!-- 登录页面 -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-logo">☁️</div>
    <h1>个人云存储</h1>
    <p class="login-sub">安全登录以访问你的数据</p>
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUser" placeholder="请输入用户名" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="pw-field">
        <input type="password" id="loginPass" placeholder="请输入密码" autocomplete="current-password">
        <button class="pw-toggle" onclick="toggleLoginPw()">👁️</button>
      </div>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-primary" onclick="doLogin()" style="width:100%;justify-content:center;padding:14px">🔐 登录</button>
  </div>
</div>

<!-- 主应用（初始隐藏） -->
<div class="app" id="mainApp" style="display:none">
  <button class="menu-btn" onclick="toggleSidebar()">☰</button>
  <aside class="sidebar" id="sidebar">
    <!-- 侧边栏由 JS 动态生成 -->
  </aside>
  <main class="main" id="main">
    <div class="header">
      <h1 class="header-title" id="pageTitle">📋 全部项目</h1>
      <div class="header-actions">
        <div class="search-bar">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="搜索..." id="searchInput" oninput="filterItems()">
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()">＋ 新建</button>
        <button class="btn btn-secondary" onclick="openSettings()" title="设置">⚙️</button>
      </div>
    </div>
    <div class="stats-bar" id="statsBar" style="display:none">
      <div class="stats-header"><h3>📊 存储占用</h3><span class="stats-total" id="statsTotal"></span></div>
      <div class="stats-progress" id="statsProgress"></div>
      <div class="stats-legend" id="statsLegend"></div>
    </div>
    <div id="contentArea">
      <div class="loading"><div class="spinner"></div></div>
    </div>
  </main>
</div>

<div id="modalContainer"></div>
<div class="toast-container" id="toastContainer"></div>
<script>// ============================================================
// 📌 分类配置 —— 新增类型只需在这里加一行
// ============================================================
const CATEGORIES = {
  images:    { id:"images",    label:"图片",   icon:"🖼️", color:"#ec4899", hasFile:true,  pageIcon:"🖼️", pageLabel:"图片" },
  novels:    { id:"novels",    label:"小说",   icon:"📖", color:"#f59e0b", hasFile:true,  pageIcon:"📖", pageLabel:"小说" },
  documents: { id:"documents", label:"文档",   icon:"📄", color:"#10b981", hasFile:true,  pageIcon:"📄", pageLabel:"文档" },
  stickies:  { id:"stickies",  label:"便利贴", icon:"📌", color:"#8b5cf6", hasFile:false, pageIcon:"📌", pageLabel:"便利贴", isSticky:true },
};
const DEFAULT_CATEGORY = "documents";
const CATEGORY_LIST = Object.values(CATEGORIES);
const PAGE_TITLES = { all: "📋 全部项目" };
const EMPTY_ICONS = { all: "📭" };
CATEGORY_LIST.forEach(c => {
  PAGE_TITLES[c.id] = c.pageIcon + " " + c.pageLabel;
  EMPTY_ICONS[c.id] = c.icon;
});
const API="/api";
let AUTH_TOKEN=localStorage.getItem("auth_token")||"";
let currentCategory="all",allItems=[],currentDetailId=null;

// ============================================================
// 🔐 认证
// ============================================================
function setToken(token){AUTH_TOKEN=token;localStorage.setItem("auth_token",token)}
function clearToken(){AUTH_TOKEN="";localStorage.removeItem("auth_token")}
async function apiFetch(path,options={}){
  const headers={...(options.headers||{})};
  if(AUTH_TOKEN)headers["Authorization"]="Bearer "+AUTH_TOKEN;
  return fetch(API+path,{...options,headers});
}
async function doLogin(){
  const user=document.getElementById("loginUser").value.trim();
  const pass=document.getElementById("loginPass").value;
  const errEl=document.getElementById("loginError");
  if(!user||!pass){errEl.textContent="请输入用户名和密码";return}
  try{
    const res=await fetch(API+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({username:user,password:pass})});
    const data=await res.json();
    if(!res.ok){errEl.textContent=data.error||"登录失败";return}
    setToken(data.token);
    if(data.username)localStorage.setItem("auth_username",data.username);
    errEl.textContent="";
    showMainApp();
  }catch(e){errEl.textContent="网络错误，请重试"}
}
function toggleLoginPw(){const i=document.getElementById("loginPass");i.type=i.type==="password"?"text":"password"}
async function checkAuth(){if(!AUTH_TOKEN)return false;try{const r=await apiFetch("/auth/check");const d=await r.json();return d.valid===true}catch(e){return false}}
async function logout(){try{await apiFetch("/auth/logout",{method:"POST"})}catch(e){}clearToken();closeModal();document.getElementById("mainApp").style.display="none";document.getElementById("loginScreen").style.display="flex"}
function showMainApp(){document.getElementById("loginScreen").style.display="none";document.getElementById("mainApp").style.display="flex";buildSidebar();setCategory("all");loadItems()}
document.addEventListener("keydown",function(e){const ls=document.getElementById("loginScreen");if(ls&&ls.style.display!=="none"&&e.key==="Enter")doLogin()});

// ============================================================
// ⚙️ 设置
// ============================================================
function openSettings(){
  const username=localStorage.getItem("auth_username")||"未知";
  document.getElementById("modalContainer").innerHTML=
    '<div class="modal"><h2>⚙️ 账户设置</h2>'+
    '<h3>当前账户</h3><p style="padding:8px 0;color:var(--text2)">用户名: <strong>'+esc(username)+'</strong></p>'+

    '<div id="settingsError" style="color:var(--danger);margin-bottom:8px"></div>'+

    '<button class="btn btn-danger" onclick="logout()">🚪 退出登录</button>'+
    '<div style="margin-top:16px"><button class="btn btn-secondary" onclick="closeModal()">关闭</button></div></div>';

async function changeCredentials(){
  const errEl=document.getElementById("settingsError");
  const newUser=document.getElementById("settingsNewUser").value.trim();
  const curPass=document.getElementById("settingsCurPass").value;
  const newPass=document.getElementById("settingsNewPass").value;
  if(!curPass){errEl.textContent="请输入当前密码";return}
  if(!newUser&&!newPass){errEl.textContent="请至少修改用户名或密码";return}
  try{
    const body={currentPassword:curPass};if(newUser)body.newUsername=newUser;if(newPass)body.newPassword=newPass;
    const res=await apiFetch("/auth/change",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    const data=await res.json();
    if(!res.ok){errEl.textContent=data.error||"修改失败";return}
    toast("凭证已更新，请牢记新密码 ✨","success");
    if(data.username)localStorage.setItem("auth_username",data.username);
    setTimeout(()=>closeModal(),1000);
  }catch(e){errEl.textContent="网络错误"}
}

async function loadStats(){

function renderStats(stats){

async function viewDetail(id){
  let item=allItems.find(i=>i.id===id);if(!item)return;
  if(!item._fullLoaded){try{const res=await apiFetch("/items/"+id);if(res.ok){const full=await res.json();item=Object.assign(item,full,{_fullLoaded:true});const idx=allItems.findIndex(i=>i.id===id);if(idx>=0)allItems[idx]=item}}catch(e){}}
  currentDetailId=id;const cat=CATEGORIES[item.category];const label=cat?cat.label:item.category;const color=cat?cat.color:"#7c5cfc";const area=document.getElementById("contentArea");
  let contentHtml="";
  if(item.hasFile&&item.fileType&&item.fileType.startsWith("image/")){
    contentHtml='<img src="/api/items/'+item.id+'/download?t='+AUTH_TOKEN+'" style="max-width:100%;border-radius:var(--radius-sm)" onerror="this.outerHTML=\'<div class=lazy-placeholder><div class=lazy-icon>⚠️</div><p>加载失败</p></div>\'">';
  }else if(item.hasFile){
    contentHtml='<div class="detail-file-info"><div class="file-type-icon">📄</div><div><strong>'+esc(item.fileName||"文件")+'</strong></div><div class="text2">'+formatSize(item.fileSize||0)+'</div></div>';
  }else if(item.category==="stickies"&&item.content){
    try{const fields=JSON.parse(item.content);contentHtml='<div class="detail-fields">'+Object.entries(fields).map(([k,v])=>{const isSensitive=k.includes("密码")||k.toLowerCase().includes("password")||k.includes("pass");return '<div class="detail-field"><span class="label">'+esc(k)+'</span><span class="value '+(isSensitive?"mono":"")+'">'+(isSensitive?'🔒 <em style="color:var(--warning)">●●●●●● (点击编辑查看)</em>':esc(String(v)))+'</span></div>'}).join("")+'</div>'}catch(e){contentHtml='<pre>'+esc(item.content)+'</pre>'}
  }else{contentHtml='<pre>'+(item.content?esc(item.content):"无内容")+'</pre>'}
  area.innerHTML='<div class="detail-back" onclick="currentDetailId=null;renderItems(allItems)">← 返回列表</div><div class="header"><h1 class="header-title">'+esc(item.title)+' <span class="card-category" style="background:'+color+'22;color:'+color+'">'+label+'</span></h1><div class="header-actions"><button class="btn btn-secondary" onclick="openEditModal(\''+item.id+'\')">✏️ 编辑</button><button class="btn btn-secondary" onclick="downloadItem(\''+item.id+'\')">⬇️ 下载</button><button class="btn btn-danger" onclick="confirmDelete(\''+item.id+'\')">🗑️ 删除</button></div></div><div class="detail-content">'+contentHtml+'</div>';
}

async function downloadItem(id){
  const item=allItems.find(i=>i.id===id);if(!item)return;
  if(item.hasFile){
    toast("下载开始！","success");const a=document.createElement("a");
    a.href="/api/items/"+id+"/download?t="+AUTH_TOKEN;a.download=item.fileName||item.title||"download";
    document.body.appendChild(a);a.click();setTimeout(()=>document.body.removeChild(a),100);
  }else{
    if(!item.content){try{const res=await apiFetch("/items/"+id);if(res.ok){const full=await res.json();if(full.content)item.content=full.content}}catch(e){}}
    if(!item.content){toast("请先点击查看详情","error");return}
    let text=item.content||"";if(item.category==="stickies"){try{const f=JSON.parse(text);text=Object.entries(f).map(([k,v])=>k+": "+v).join("\n")}catch(e){}}
    const blob=new Blob([text],{type:"text/plain;charset=utf-8"});const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=(item.title||"download")+".txt";
    document.body.appendChild(a);a.click();setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},1000);
    toast("下载开始！","success");
  }
}

function openCreateModal(){showModal("新建项目","create",null);const cat=currentCategory==="all"?DEFAULT_CATEGORY:currentCategory;document.getElementById("modal-category").value=cat;onCategoryChange()}
async function openEditModal(id){

function showModal(title,mode,item){
  const isSticky=mode==="create"?currentCategory==="stickies":(item&&item.category==="stickies");
  const selCat=(item&&item.category)||(currentCategory==="all"?DEFAULT_CATEGORY:currentCategory);
  const catOptions=CATEGORY_LIST.map(c=>'<option value="'+c.id+'"'+(selCat===c.id?" selected":"")+'>'+c.icon+' '+c.label+'</option>').join("");

    '<div class="form-group"><label>分类</label><select id="modal-category" onchange="onCategoryChange()">'+catOptions+'</select></div>'+
    '<div class="form-group"><label>标题 *</label><input type="text" id="modal-title" value="'+escAttr(item?item.title:"")+'" placeholder="输入标题"></div>'+
    '<div id="stickyFields">'+(isSticky?getStickyFieldsHtml(item):'<div class="form-group"><label>内容</label><textarea id="modal-content" placeholder="输入内容...">'+escAttr(item?item.content||"":"")+'</textarea></div>')+'</div>'+
    '<div id="fileUploadArea">'+(isSticky?"":getFileUploadHtml(item))+'</div>'+
    '<div class="form-actions"><button class="btn btn-secondary" onclick="closeModal()">取消</button>'+
    '<button class="btn btn-primary" onclick="submitForm(\''+mode+'\''+(item?',\''+item.id+'\'':"")+')">'+(mode==="create"?"创建":"保存")+'</button></div></div></div>';
}
function getStickyFieldsHtml(item){
  let fields={};if(item&&item.content){try{fields=JSON.parse(item.content)}catch(e){}}
  if(Object.keys(fields).length===0)fields={"账号/平台":"","用户名":"","密码":"","备注":""};
  return '<div id="stickyFieldsContainer">'+Object.entries(fields).map(([k,v],i)=>
    '<div class="form-group sticky-field-row" style="display:flex;gap:8px;align-items:center"><input type="text" value="'+escAttr(k)+'" placeholder="字段名" style="flex:1" class="sticky-key"><div class="pw-field" style="flex:1"><input type="password" value="'+escAttr(v)+'" placeholder="值" class="sticky-val"><button class="pw-toggle" onclick="togglePw(this)">👁️</button></div><button class="btn btn-sm btn-secondary" onclick="this.parentElement.remove()" style="flex-shrink:0">✕</button></div>'
  ).join("")+'</div><button class="btn btn-sm btn-secondary" onclick="addStickyField()" style="margin-top:8px">＋ 添加字段</button>';
}
function addStickyField(){const c=document.getElementById("stickyFieldsContainer");const r=document.createElement("div");r.className="form-group sticky-field-row";r.style.cssText="display:flex;gap:8px;align-items:center";r.innerHTML='<input type="text" placeholder="字段名" style="flex:1" class="sticky-key"><div class="pw-field" style="flex:1"><input type="password" placeholder="值" class="sticky-val"><button class="pw-toggle" onclick="togglePw(this)">👁️</button></div><button class="btn btn-sm btn-secondary" onclick="this.parentElement.remove()" style="flex-shrink:0">✕</button>';c.appendChild(r)}
function togglePw(btn){const i=btn.parentElement.querySelector("input");i.type=i.type==="password"?"text":"password";btn.textContent=i.type==="password"?"👁️":"🙈"}
function onCategoryChange(){const cat=document.getElementById("modal-category").value;const cfg=CATEGORIES[cat];const sd=document.getElementById("stickyFields");const fd=document.getElementById("fileUploadArea");if(cfg&&cfg.isSticky){sd.innerHTML=getStickyFieldsHtml(null);fd.innerHTML=""}else{sd.innerHTML='<div class="form-group"><label>内容</label><textarea id="modal-content" placeholder="输入内容..."></textarea></div>';fd.innerHTML=getFileUploadHtml(null)}}
function getFileUploadHtml(item){const hasFile=item&&item.fileData;return '<div class="form-group"><label>文件附件</label>'+(hasFile?'<div class="file-preview"><span>📄</span><span class="name">'+esc(item.fileName)+'</span><span class="size">'+formatSize(item.fileSize||0)+'</span></div>':'<div class="file-drop" onclick="document.getElementById(\'fileInput\').click()" id="fileDrop"><div class="icon">📁</div><p>点击或拖拽文件到此处上传</p></div>')+'<input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)"></div>';}
let selectedFile=null;
function handleFileSelect(e){const file=e.target.files[0];if(!file)return;if(file.size>50*1024*1024){toast("文件不能超过50MB","error");return}selectedFile=file;const reader=new FileReader();reader.onload=function(ev){const drop=document.getElementById("fileDrop");if(drop){const isImg=file.type.startsWith("image/");drop.innerHTML='<div class="file-preview">'+(isImg?'<img src="'+ev.target.result+'">':'<span>'+getFileIcon(file.type)+'</span>')+'<span class="name">'+esc(file.name)+'</span><span class="size">'+formatSize(file.size)+'</span><span class="remove" onclick="removeFile()">✕</span></div>'}};reader.readAsDataURL(file)}
function getFileIcon(t){if(!t)return"📄";if(t.startsWith("image/"))return"🖼️";if(t.startsWith("video/"))return"🎬";if(t.startsWith("audio/"))return"🎵";if(t.startsWith("text/"))return"📝";if(t.includes("pdf"))return"📕";if(t.includes("zip")||t.includes("rar")||t.includes("gz"))return"📦";if(t.includes("word")||t.includes("document"))return"📄";if(t.includes("excel")||t.includes("sheet"))return"📊";return"📁"}
function removeFile(){selectedFile=null;document.getElementById("uploadProgress").style.display="none";const drop=document.getElementById("fileDrop");if(drop)drop.innerHTML='<div class="icon">📁</div><p>点击或拖拽文件到此处上传</p>'}
document.addEventListener("dragover",e=>{e.preventDefault();const d=document.getElementById("fileDrop");if(d)d.classList.add("drag")});
document.addEventListener("dragleave",e=>{const d=document.getElementById("fileDrop");if(d)d.classList.remove("drag")});
document.addEventListener("drop",e=>{e.preventDefault();const d=document.getElementById("fileDrop");if(d)d.classList.remove("drag");if(e.dataTransfer.files.length)handleFileSelect({target:{files:e.dataTransfer.files}})});

// ============================================================
// 📤 提交表单 - 非阻塞上传, 直接插入列表
// ============================================================
async function submitForm(mode,id){
  const title=document.getElementById("modal-title").value.trim();if(!title){toast("请输入标题","error");return}
  const category=document.getElementById("modal-category").value;const cfg=CATEGORIES[category];const isSticky=cfg&&cfg.isSticky;
  let stickyData=null,fileContent="";
  if(isSticky){const keys=document.querySelectorAll(".sticky-key");const vals=document.querySelectorAll(".sticky-val");const obj={};keys.forEach((k,i)=>{if(k.value.trim())obj[k.value.trim()]=vals[i]?vals[i].value:""});if(Object.keys(obj).length===0){toast("请至少添加一个字段","error");return}stickyData=JSON.stringify(obj)}
  else{const ta=document.getElementById("modal-content");fileContent=ta?ta.value:""}
  const uploadFile=selectedFile;
  const toastId="toast_"+Date.now();showUploadingToast(toastId);closeModal();selectedFile=null;
  let res;
  try{
    if(isSticky){const body={title,content:stickyData,category};const u=mode==="create"?"/items":"/items/"+id;const m=mode==="create"?"POST":"PUT";res=await apiFetch(u,{method:m,headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})}
    else if(uploadFile){const form=new FormData();form.append("title",title);form.append("content",fileContent);form.append("category",category);form.append("file",uploadFile,uploadFile.name);const u=mode==="create"?"/items":"/items/"+id;const m=mode==="create"?"POST":"PUT";res=await uploadWithProgress(u,m,form)}
    else{let content=fileContent;const body={title,content,category};if(mode==="edit"){const ex=allItems.find(i=>i.id===id);if(ex){body.fileData=ex.fileData||null;body.fileName=ex.fileName;body.fileType=ex.fileType;body.fileSize=ex.fileSize}}const u=mode==="create"?"/items":"/items/"+id;const m=mode==="create"?"POST":"PUT";res=await apiFetch(u,{method:m,headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})}
    if(!res.ok){const e=await res.json();throw new Error(e.error||"操作失败")}
    const saved=await res.json();removeToast(toastId);
    if(mode==="create"){allItems.unshift(saved)}else{const idx=allItems.findIndex(i=>i.id===id);if(idx>=0)Object.assign(allItems[idx],saved)}
    updateCounts();loadStats();renderItems(allItems);toast(mode==="create"?"创建成功！":"更新成功！","success");
  }catch(e){removeToast(toastId);toast(e.message,"error")}
}
function uploadWithProgress(url,method,formData){return new Promise((resolve,reject)=>{const xhr=new XMLHttpRequest();xhr.open(method,"/api"+url);if(AUTH_TOKEN)xhr.setRequestHeader("Authorization","Bearer "+AUTH_TOKEN);xhr.upload.onprogress=e=>{if(e.lengthComputable){const pct=Math.round(e.loaded/e.total*100);const bar=document.getElementById("uploadFill");const txt=document.getElementById("uploadText");if(bar)bar.style.width=pct+"%";if(txt)txt.textContent=pct+"%"}};xhr.onload=()=>{try{const data=JSON.parse(xhr.responseText);resolve({ok:xhr.status>=200&&xhr.status<300,json:()=>Promise.resolve(data),status:xhr.status})}catch(e){resolve({ok:xhr.status>=200&&xhr.status<300,json:()=>Promise.resolve({}),status:xhr.status})}};xhr.onerror=()=>reject(new Error("网络错误"));xhr.send(formData)})}
function showUploadingToast(id){const c=document.getElementById("toastContainer");const el=document.createElement("div");el.id=id;el.className="toast toast-info";el.innerHTML='<div class="toast-spinner"></div> 正在上传，请稍候...';c.appendChild(el)}
function removeToast(id){const el=document.getElementById(id);if(el)el.remove()}

function confirmDelete(id){const c=document.getElementById("modalContainer");c.innerHTML='<div class="confirm-overlay"><div class="confirm-dialog"><h3>确认删除</h3><p>删除后不可恢复，确定要删除吗？</p><div class="confirm-actions"><button class="btn btn-secondary" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="deleteItem(\''+id+'\')">确认删除</button></div></div></div>'}
async function deleteItem(id){try{const res=await apiFetch("/items/"+id,{method:"DELETE"});if(!res.ok)throw new Error("删除失败");closeModal();allItems=allItems.filter(i=>i.id!==id);updateCounts();loadStats();renderItems(allItems);toast("已删除","success")}catch(e){toast(e.message,"error")}}
function closeModal(){document.getElementById("modalContainer").innerHTML="";selectedFile=null;const bar=document.getElementById("uploadProgress");if(bar)bar.style.display="none"}

// ============================================================
// 🔧 工具函数
// ============================================================
function toast(msg,type){const c=document.getElementById("toastContainer");const el=document.createElement("div");el.className="toast "+type;el.textContent=msg;c.appendChild(el);setTimeout(()=>{el.style.opacity="0";el.style.transition="opacity .3s";setTimeout(()=>el.remove(),300)},2500)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function escAttr(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function fmtDate(d){if(!d)return"";return new Date(d).toLocaleDateString("zh-CN",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"})}
function formatSize(b){if(!b)return"0 B";const u=["B","KB","MB","GB"];let i=0;while(b>=1024&&i<3){b/=1024;i++}return b.toFixed(1)+" "+u[i]}
